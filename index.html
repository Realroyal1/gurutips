    <style>
        :root { --primary: #ffcc00; --bg: #000000; --card: #111111; --text: #ffffff; }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow-x: hidden; 
            padding-bottom: 70px; /* Space for mobile nav */
        }

        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        /* Header */
        header {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border-bottom: 3px solid var(--primary);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .logo-img { height: 50px; }

        nav { display: flex; gap: 20px; }
        
        nav a { 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.85rem; 
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            transition: 0.3s;
        }

        nav a:hover { color: var(--primary); }

        .live-link {
            background: rgba(255, 0, 0, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Hero */
        .hero {
            padding: 60px 8%;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200');
            background-size: cover;
        }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); color: var(--primary); }

        /* CTA Bar */
        .sure-odds-cta {
            background: var(--primary);
            color: #000;
            padding: 20px;
            text-align: center;
            font-weight: 800;
            text-decoration: none;
            display: block;
            font-size: 1.5rem;
            font-family: 'Oswald';
            transition: 0.3s;
        }

        /* Grid */
        .prediction-container {
            padding: 40px 8%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-box { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        
        .cat-header {
            background: #222;
            color: var(--primary);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .design-img { width: 100%; display: block; height: auto; }

        /* Socials */
        .social-section { padding: 60px 8%; text-align: center; background: #0a0a0a; }
        .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; max-width: 1000px; margin: 30px auto; }
        .social-card { background: var(--card); padding: 15px; border-radius: 10px; text-decoration: none; color: #fff; border: 1px solid #333; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .social-card:hover { background: var(--primary); color: #000; }

        /* Bottom Nav (App Style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            display: none; /* Hidden on Desktop */
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid var(--primary);
            z-index: 2000;
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            text-align: center;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: var(--primary); }

        footer { padding: 40px 8% 100px; text-align: center; border-top: 1px solid #222; font-size: 0.8rem; color: #666; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            header nav, .live-link { display: none; }
            header { justify-content: center; }
            .bottom-nav { display: flex; }
            .hero { padding: 40px 5%; }
            .hero h1 { font-size: 2.2rem; }
            .sure-odds-cta { font-size: 1.1rem; }
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
